<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
    </header>
    <div class="container">
        <aside class="aside">
        </aside>
        <main class="main-container">
            <div class="item-small">
                <div class="small-column">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
                <div class="small-column">
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                    <div class="item"></div>
                </div>
            </div>
            <div class="item-big">
            </div>
            <div class="item-line"></div>
            <div class="comment-nav">
                <div class="nav-item">
                    <div class="title-comment">Комментарии
                        <span>(<span  class="num-comment">0</span>)</span>
                    </div>
                    <div class="comment-line"></div>
                </div>
                <div class="nav-item">
                    <span class="title title-sort active">По количеству оценок</span>
                    <span class="title title-sort">По дате</span>
                    <span class="title title-sort">По актуальности</span>
                    <span class="title title-sort">По количеству ответов</span>
                    <img src="https://cdn-icons-png.flaticon.com/512/959/959159.png" width = "25px" height = "25px"  alt="arrow-down">
                </div>
                <div class="nav-item">
                    <span class="title title-favorites">Избранное</span>
                    <img src="https://img.freepik.com/free-vector/illustration-of-medical-icon_53876-6166.jpg?size=626&ext=jpg" width = "50px" height = "50px" alt="favorites">
                </div>
            </div>
            <div class="comment-person">
                <img src="https://images.unsplash.com/photo-1508185159346-bb1c5e93ebb4?ixlib=rb-0.3.5&ixid=eyJhcHBfaWQiOjEyMDd9&s=55cf14db6ed80a0410e229368963e9d8&auto=format&fit=crop&w=1900&q=80'}" alt="person-avatar" class="person-avatar"></img>
                <div class="person-messege">
                    <div class="name-symbol">
                        <div class="name"></div>
                        <span class="symbol">Макс. <span class="countSymbol">1000</span> символов</span>
                    </div>
                    <input class="message" placeholder="Введите текст сообщения..."></input>
                </div>
                <button class="button">Отправить</button>
            </div>
            <div class="comment-field">            
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
